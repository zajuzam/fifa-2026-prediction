name: FIFA 2026 — Auto Update Scores

on:
  schedule:
    # 5 AM EDT = 09:00 UTC (runs daily during tournament Jun 11 – Jul 19)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab (useful for testing)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run score updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_scores.py
